[graph]
# Only check the default target triple
targets = []

[advisories]
yanked = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "Unicode-3.0",
    # Permissive licenses of already-vendored transitive deps (cargo deny was red on main without these):
    "ISC",                  # inotify/inotify-sys (notify file-watcher), ring/untrusted (rustls TLS)
    "CC0-1.0",              # notify (file-watcher) — public-domain dedication
    "CDLA-Permissive-2.0",  # webpki-roots (Mozilla CA bundle, via rustls)
]
confidence-threshold = 0.9

[bans]
# No duplicate versions of the same crate
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

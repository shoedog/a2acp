[graph]
# Only check the default target triple
targets = []

[advisories]
yanked = "deny"

[licenses]
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "Unicode-3.0",
]
confidence-threshold = 0.9

[bans]
# No duplicate versions of the same crate
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# a2a-bridge egress proxy — content-blind CONNECT allowlist (no MITM).
# tinyproxy booleans are Yes/No (NOT On/Off), and directives take no trailing inline comments.
Port 8888
Listen 0.0.0.0
Timeout 600

# Default-deny: the Filter file is an ALLOWLIST; everything not matched is refused.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/filter"
# POSIX ERE (so anchored host regexes work), case-insensitive host match.
FilterExtended Yes
FilterCaseSensitive No

# Allow CONNECT tunnels only to 443 (HTTPS to the model providers).
ConnectPort 443

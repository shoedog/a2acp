[package]
name = "a2a-bridge"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true
repository = "https://github.com/shoedog/a2acp"

[[bin]]
name = "a2a-bridge"
path = "src/main.rs"

[package.metadata.binstall]
pkg-url = "{ repo }/releases/download/v{ version }/{ name }-v{ version }-{ target }.tar.gz"
pkg-fmt = "tgz"
bin-dir = "{ bin }{ binary-ext }"

[dependencies]
bridge-core = { path = "../../crates/bridge-core" }
bridge-coordinator = { path = "../../crates/bridge-coordinator" }
bridge-workflow = { path = "../../crates/bridge-workflow" }
bridge-mcp = { path = "../../crates/bridge-mcp" }
lsp-mcp = { path = "../../crates/lsp-mcp" }
bridge-acp = { path = "../../crates/bridge-acp" }
bridge-a2a-inbound = { path = "../../crates/bridge-a2a-inbound" }
bridge-a2a-outbound = { path = "../../crates/bridge-a2a-outbound" }
bridge-store = { path = "../../crates/bridge-store" }
bridge-policy = { path = "../../crates/bridge-policy" }
bridge-observ = { path = "../../crates/bridge-observ" }
bridge-registry = { path = "../../crates/bridge-registry" }
bridge-api = { path = "../../crates/bridge-api" }
bridge-container = { path = "../../crates/bridge-container" }
bridge-worktree = { path = "../../crates/bridge-worktree" }
tokio = { workspace = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true }
axum = { workspace = true }
serde = { workspace = true }
toml = { workspace = true }
tracing.workspace = true
notify = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
arc-swap = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
serde_json = { workspace = true }
a2a.workspace = true

[dev-dependencies]
tokio = { workspace = true }
tower = { workspace = true, features = ["util"] }
futures = { workspace = true }
serde_json = { workspace = true }
axum = { workspace = true }
a2a = { workspace = true }
async-trait = { workspace = true }
bridge-acp = { path = "../../crates/bridge-acp" }
bridge-a2a-outbound = { path = "../../crates/bridge-a2a-outbound" }
bridge-store = { path = "../../crates/bridge-store" }
bridge-policy = { path = "../../crates/bridge-policy" }
bridge-a2a-inbound = { path = "../../crates/bridge-a2a-inbound" }
bridge-core = { path = "../../crates/bridge-core" }
bridge-registry = { path = "../../crates/bridge-registry" }
bridge-api = { path = "../../crates/bridge-api" }
bridge-workflow = { path = "../../crates/bridge-workflow" }
toml = { workspace = true }
serde = { workspace = true }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
tempfile = "3"
wiremock = "0.6"

name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  ci:
    name: Build, Lint, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-deny

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo deny check
        run: cargo deny check

      - name: Coverage — workspace (≥85% line coverage)
        run: cargo llvm-cov --workspace --fail-under-lines 85

      - name: Coverage — bridge-core (≥90% line coverage)
        run: cargo llvm-cov --package bridge-core --fail-under-lines 90

      - name: Coverage — bridge-acp (≥90% line coverage)
        run: cargo llvm-cov --package bridge-acp --fail-under-lines 90

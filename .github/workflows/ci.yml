name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read
  issues: read

jobs:
  ci:
    name: Build, Lint, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy, llvm-tools-preview

      - name: Print rustc version
        run: rustc --version

      - name: Install cargo-llvm-cov and cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-deny

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Validate issue intake
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          live_labels="$(mktemp)"
          gh api --paginate "repos/${GITHUB_REPOSITORY}/labels?per_page=100" --jq '.[].name' > "$live_labels"
          ruby tools/validate_issue_intake.rb --live-labels "$live_labels"
          ruby tools/validate_issue_intake_test.rb

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo deny check
        run: cargo deny check

      - name: Workflow artifact hygiene
        run: cargo run -p a2a-bridge -- validate --repo-hygiene

      - name: Coverage — workspace (≥85% line coverage)
        run: cargo llvm-cov --workspace --fail-under-lines 85

      - name: Coverage — bridge-core (≥90% line coverage)
        run: cargo llvm-cov --package bridge-core --fail-under-lines 90

      - name: Coverage — bridge-acp (≥90% line coverage)
        run: cargo llvm-cov --package bridge-acp --fail-under-lines 90

      - name: Coverage — bridge-api (≥90% line coverage)
        run: cargo llvm-cov --package bridge-api --fail-under-lines 90

      - name: Coverage — bridge-workflow (≥90% line coverage)
        run: cargo llvm-cov --package bridge-workflow --fail-under-lines 90

      - name: Coverage — bridge-coordinator (≥85% line coverage)
        run: cargo llvm-cov --package bridge-coordinator --fail-under-lines 85

      - name: Coverage — bridge-mcp (≥70% line coverage)
        run: cargo llvm-cov --package bridge-mcp --fail-under-lines 70

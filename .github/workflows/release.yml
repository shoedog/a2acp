# Release workflow — builds & publishes a2a-bridge binaries for tagged releases.
#
# FAILED-RELEASE RUNBOOK (read this before touching a tag):
#   If this workflow fails AFTER a release tag has already been pushed:
#     1. Fix the root cause on a normal commit/PR and merge it to main.
#     2. Re-run the SAME tag's failed workflow run (Actions UI "Re-run jobs", or
#        `gh run rerun <run-id>`). Do NOT push a new tag for the same version.
#     3. If a partial release exists (some assets published, others missing), fix
#        forward with `gh release upload <tag> <missing-asset> --clobber` instead
#        of recreating the release.
#     4. NEVER move, delete, or force-push an already-published tag. Tags are
#        immutable once released — a mistake needs a new patch version, not a
#        retagged one.
#   `workflow_dispatch` (no tag) is the safe dry run: it builds and smoke-tests all
#   three targets and uploads them as workflow-run artifacts only — no GitHub
#   Release is created. Use it post-merge, pre-tag, to validate the pipeline.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cheap validation first: fail before any target build burns minutes.
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Validate tag and derive version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "workflow_dispatch dry run — skipping tag checks; version comes from Cargo.toml."
            echo "version=${CARGO_VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag '${TAG}' does not match ^v[0-9]+\.[0-9]+\.[0-9]+\$"
            exit 1
          fi

          VERSION="${TAG#v}"
          if [[ "$VERSION" != "$CARGO_VERSION" ]]; then
            echo "::error::tag version '${VERSION}' does not match [workspace.package].version '${CARGO_VERSION}' in Cargo.toml"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-macos-arm64:
    name: Build (aarch64-apple-darwin)
    needs: preflight
    runs-on: macos-14
    env:
      TARGET: aarch64-apple-darwin
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build
        run: cargo build --release --locked -p a2a-bridge -j 2

      - name: Smoke test (--help)
        run: ./target/release/a2a-bridge --help

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          NAME="a2a-bridge-v${VERSION}-${TARGET}"
          STAGE="$(mktemp -d)/${NAME}"
          mkdir -p "$STAGE"
          cp target/release/a2a-bridge "$STAGE/"
          cp LICENSE "$STAGE/"
          cp README.md "$STAGE/"
          tar -czf "${NAME}.tar.gz" -C "$STAGE" a2a-bridge LICENSE README.md
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: a2a-bridge-v${{ needs.preflight.outputs.version }}-aarch64-apple-darwin
          path: |
            a2a-bridge-v${{ needs.preflight.outputs.version }}-aarch64-apple-darwin.tar.gz
            a2a-bridge-v${{ needs.preflight.outputs.version }}-aarch64-apple-darwin.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  build-linux-x64:
    name: Build (x86_64-unknown-linux-gnu)
    needs: preflight
    runs-on: ubuntu-24.04
    env:
      TARGET: x86_64-unknown-linux-gnu
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build
        run: cargo build --release --locked -p a2a-bridge -j 2

      - name: Smoke test (--help)
        run: ./target/release/a2a-bridge --help

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          NAME="a2a-bridge-v${VERSION}-${TARGET}"
          STAGE="$(mktemp -d)/${NAME}"
          mkdir -p "$STAGE"
          cp target/release/a2a-bridge "$STAGE/"
          cp LICENSE "$STAGE/"
          cp README.md "$STAGE/"
          tar -czf "${NAME}.tar.gz" -C "$STAGE" a2a-bridge LICENSE README.md
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: a2a-bridge-v${{ needs.preflight.outputs.version }}-x86_64-unknown-linux-gnu
          path: |
            a2a-bridge-v${{ needs.preflight.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz
            a2a-bridge-v${{ needs.preflight.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  build-linux-arm64:
    name: Build (aarch64-unknown-linux-gnu)
    needs: preflight
    runs-on: ubuntu-24.04-arm
    env:
      TARGET: aarch64-unknown-linux-gnu
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Build
        run: cargo build --release --locked -p a2a-bridge -j 2

      - name: Smoke test (--help)
        run: ./target/release/a2a-bridge --help

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          NAME="a2a-bridge-v${VERSION}-${TARGET}"
          STAGE="$(mktemp -d)/${NAME}"
          mkdir -p "$STAGE"
          cp target/release/a2a-bridge "$STAGE/"
          cp LICENSE "$STAGE/"
          cp README.md "$STAGE/"
          tar -czf "${NAME}.tar.gz" -C "$STAGE" a2a-bridge LICENSE README.md
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: a2a-bridge-v${{ needs.preflight.outputs.version }}-aarch64-unknown-linux-gnu
          path: |
            a2a-bridge-v${{ needs.preflight.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz
            a2a-bridge-v${{ needs.preflight.outputs.version }}-aarch64-unknown-linux-gnu.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  # Tag pushes only — workflow_dispatch is a build-and-smoke-test dry run with no
  # release created (see the runbook comment at the top of this file).
  release:
    name: Publish GitHub release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [preflight, build-macos-arm64, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Assemble SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          cat -- *.tar.gz.sha256 > SHA256SUMS
          rm -f -- *.tar.gz.sha256
          ls -la

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          VER_RE="${VERSION//./\\.}"
          NOTES="$(mktemp)"
          awk -v ver="$VER_RE" '
            $0 ~ ("^## \\[" ver "\\]") { p=1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > "$NOTES"
          if [[ ! -s "$NOTES" ]]; then
            echo "::error::CHANGELOG.md has no '## [${VERSION}]' section — refusing to publish a blank-body release"
            exit 1
          fi
          gh release create "$TAG" \
            --verify-tag \
            --title "a2a-bridge $TAG" \
            --notes-file "$NOTES" \
            dist/SHA256SUMS dist/*.tar.gz

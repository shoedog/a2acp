# Canonical multi-agent reference config for the a2a-bridge.
#
# This file lives in `examples/`, so its workflow `prompt_file` paths use
# `../prompts/...` (prompts live in the repo's `prompts/` dir). `a2a-bridge init`
# generates a near-identical config that writes its own `prompts/` and uses
# `prompts/...` instead. Run it with:
#     a2a-bridge serve --config examples/a2a-bridge.multi-agent.toml
#
# model/effort/mode (all OPTIONAL, all applied per session):
#   model  -> set via the agent's advertised model config option, VALIDATED at mint
#             (pinning an unadvertised value hard-fails the session, listing the
#             advertised values): claude/codex advertise it via
#             session/set_config_option(category="model"). Agents that do not
#             advertise a model config option should be left unpinned; the live
#             catalog marks discovery-only lists as `model_configurable: false`.
#             Raw advertised ids win; if `opus` is not advertised it falls back
#             to default. Fable-family model ids are blocked by this bridge and
#             omitted from the usable model catalog. claude's served model is visible in
#             claude's own session transcript, not surfaced through the bridge.
#   effort -> session/set_config_option(thought-level) for ANY agent that
#             advertises one (codex `reasoning_effort`, claude `effort`). Falls
#             back to the highest supported level <= requested; skipped with a warn
#             if the agent advertises no effort option. Values:
#             minimal|low|medium|high|xhigh|max.
#   mode   -> session/set_mode, which HARD-FAILS on an unknown/invalid mode id
#             (modes are agent-native). Omitted here on purpose; set it only to a
#             mode your agent actually advertises.

default = "kiro"

[registry]
# Exact allowlist of process commands the bridge may spawn (the `api` agent has
# no command and is NOT listed here).
allowed_cmds = ["kiro-cli", "codex-acp", "claude-agent-acp"]

[store]
# Durable task store (detached submit + crash-resume + streaming reattach).
# A relative path resolves against THIS config file's directory.
path = ".a2a-bridge/tasks.sqlite"
resume_attempt_cap = 3

[server]
addr = "127.0.0.1:8080"

# kiro: zero-auth local default (kiro-cli acp). ACP SDK 1.x can discover Kiro's
# native model list, but cannot apply Kiro model pins unless the catalog marks
# the agent `model_configurable: true`; leave model unpinned by default.
[[agents]]
id    = "kiro"
cmd   = "kiro-cli"
args  = ["acp"]

# codex: gpt-5.5 with reasoning_effort. The host `codex login` is ambient;
# do not restart the browser login flow during bridge initialization.
[[agents]]
id     = "codex"
cmd    = "codex-acp"
pre_authenticated = true
model  = "gpt-5.5"
effort = "high"

# claude: subscription. `model` is validated against the advertised values and
# applied. Fable-family model ids are blocked by this bridge; use another advertised model.
[[agents]]
id    = "claude"
cmd   = "claude-agent-acp"
model = "sonnet"

# api: OpenAI-compatible non-process backend. `api_key_env` is the NAME of an env
# var holding the token (NEVER the secret). Effort is not applied for api agents.
[[agents]]
id          = "api"
kind        = "api"
base_url    = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
model       = "gpt-4o-mini"

# ── Review workflows: two independent reviewer lenses (codex + claude) + a synthesis ──
[[workflows]]
id = "code-review"
[[workflows.nodes]]
id = "correctness"
agent = "codex"
prompt_file = "../prompts/review-correctness.md"
inputs = []
[[workflows.nodes]]
id = "architecture"
agent = "claude"
prompt_file = "../prompts/review-architecture.md"
inputs = []
[[workflows.nodes]]
id = "synth"
agent = "claude"
prompt_file = "../prompts/review-synth.md"
inputs = ["correctness", "architecture"]

[[workflows]]
id = "spec-review"
[[workflows.nodes]]
id = "rigordraft"
agent = "codex"
prompt_file = "../prompts/spec-review-rigor.md"
inputs = []
[[workflows.nodes]]
id = "soundnessdraft"
agent = "claude"
prompt_file = "../prompts/spec-review-soundness.md"
inputs = []
[[workflows.nodes]]
id = "rigor"
agent = "codex"
prompt_file = "../prompts/spec-review-rigor-refine.md"
inputs = ["rigordraft"]
[[workflows.nodes]]
id = "soundness"
agent = "claude"
prompt_file = "../prompts/spec-review-soundness-refine.md"
inputs = ["soundnessdraft"]
[[workflows.nodes]]
id = "synth"
agent = "claude"
prompt_file = "../prompts/spec-review-synth.md"
inputs = ["rigor", "soundness"]

[[workflows]]
id = "plan-review"
[[workflows.nodes]]
id = "execdraft"
agent = "codex"
prompt_file = "../prompts/plan-review-exec.md"
inputs = []
[[workflows.nodes]]
id = "coveragedraft"
agent = "claude"
prompt_file = "../prompts/plan-review-coverage.md"
inputs = []
[[workflows.nodes]]
id = "exec"
agent = "codex"
prompt_file = "../prompts/plan-review-exec-refine.md"
inputs = ["execdraft"]
[[workflows.nodes]]
id = "coverage"
agent = "claude"
prompt_file = "../prompts/plan-review-coverage-refine.md"
inputs = ["coveragedraft"]
[[workflows.nodes]]
id = "synth"
agent = "claude"
prompt_file = "../prompts/plan-review-synth.md"
inputs = ["exec", "coverage"]

# design: two CLEAN-ROOM architect lenses (firewalled — inputs=[] so neither sees
# the other) + a synth that merges convergent-spine + adjudicated-divergences.
# Feed a PROBLEM STATEMENT as the input; the architects read the repo (read-only).
[[workflows]]
id = "design"
# draft = clean-room (inputs=[], reuse the existing lens prompts)
[[workflows.nodes]]
id = "executabilitydraft"
agent = "codex"
prompt_file = "../prompts/design-executability.md"
inputs = []
[[workflows.nodes]]
id = "structuredraft"
agent = "claude"
prompt_file = "../prompts/design-structure.md"
inputs = []
# refine = grounded second pass on OWN draft (firewall preserved: each sees only its own draft)
[[workflows.nodes]]
id = "executability"
agent = "codex"
prompt_file = "../prompts/design-executability-refine.md"
inputs = ["executabilitydraft"]
[[workflows.nodes]]
id = "structure"
agent = "claude"
prompt_file = "../prompts/design-structure-refine.md"
inputs = ["structuredraft"]
# synth UNCHANGED (consumes the refined lenses)
[[workflows.nodes]]
id = "synth"
agent = "claude"
prompt_file = "../prompts/design-synth.md"
inputs = ["executability", "structure"]

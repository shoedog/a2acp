# Codex (gpt-5.5, effort=high) as the IMPLEMENTER for Slice 10 (B2 weighted fan-out panel).
# session-cwd = the repo, on feat/slice-10-fanout-panel; codex EDITS the tree, runs cargo, does NOT commit.
default = "codex"
[[agents]]
id = "codex"
cmd = "codex-acp"
model = "gpt-5.5"
effort = "high"
args = ["-c", "sandbox_mode=\"danger-full-access\"", "-c", "approval_policy=\"never\""]
[[workflows]]
id = "slice-10-impl"
[[workflows.nodes]]
id = "impl"
agent = "codex"
prompt_file = "../prompts/slice-10-impl.md"
inputs = []
[server]
addr = "127.0.0.1:8130"

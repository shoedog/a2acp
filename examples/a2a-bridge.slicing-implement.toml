# Containerized :ro readers (claude + codex + kiro) behind the egress lock, + the non-process ollama.
# Run:  a2a-bridge serve --config examples/a2a-bridge.containerized.toml   (from the repo root)
# Prereqs (see docs/containerized-agents.md):
#   - docker compose -f deploy/containers/compose.egress.yaml up -d --build
#   - the reader image built (deploy/containers/reader.Containerfile)
#   - per-agent creds: WRITABLE single-file copies in ~/.config/a2a-creds/{claude,codex}, and a
#     one-time `kiro-cli login --use-device-flow` into the `a2a-kiro-data` volume.
#
# MUST-FIX (dual-review): allowed_cwd_root is OPT-IN and MUST equal the mount root, or readers ship
# with NO cwd gate. Identical-path :ro mount makes the session/new cwd resolve inside the container.

default = "claude"

allowed_cwd_root = "/Users/wesleyjinks/code"

# B2b-3a: the review-the-diff run after `implement` commits + verifies. Two folded reviewers (codex+claude)
# review `git diff base..HEAD` in the clone (read-only nav tools) -> a synth emits VERDICT: APPROVE|REJECT,
# surfaced in the hand-off. ADVISORY (the operator accepts at merge). Absent -> skipped.
[review]
workflow = "implement-review"
timeout_secs = 900   # 15 min: 300s was too tight for the 2-lens diff review (it timed out on Task 1 attempt-2)

# B2b-3b: the review->tweak loop. After the first commit, the bridge runs verify+review each attempt; on a
# verify-FAIL or review-REJECT it re-prompts the `impl` agent (the `implement-fix` workflow) to fix on the
# SAME clone, then AMENDs the fix into the single commit. Bounded by max_attempts (commit turns: the initial
# commit + up to max_attempts-1 fix amends). Advisory -> the operator still accepts at merge. Absent -> 3.
[implement]
max_attempts = 3
fix_workflow = "implement-fix"

# B2b-2: the build+test verify run after `a2a-bridge implement` commits. Bridge-deterministic (the
# agent can't fake it), REPORTED not gating. Separate egress (registries only; NO creds) so creds and
# registry-egress never coexist. Coverage is opt-in (commented) — it can't reuse the warm non-instrumented
# cache. Default gates are fmt/clippy/build/test, all --locked against the :ro clone.
[verify]
image    = "a2a-toolchain:latest"
cache    = "a2a-verify-cache"                  # per-repo: the bridge appends a hash of the source path
egress   = "locked"
network  = "a2a-verify-egress"
proxy    = "http://a2a-verify-proxy:8888"
# NO_PROXY=localhost so `cargo test`'s local HTTP servers (wiremock etc.) aren't hijacked by the cargo-
# fetch proxy. Without it, any test that binds 127.0.0.1 spuriously fails verify (live-gate finding).
no_proxy = "localhost,127.0.0.1"
# SLICING repo verify gates. No clippy gate: this repo is not clippy-`-D warnings` clean, and gating on
# it would send the fix loop chasing pre-existing warnings. fmt + build + full test suite is the contract.

[[languages]]
id = "rust"
fetch = "cargo fetch --locked"
warm_cache = "a2a-impl-lsp-cache"
dep_cache_path = "/cargo"
verify_cache_path = "/cache"
fetch_env = { CARGO_HOME = "/cargo" }
verify_env = { CARGO_HOME = "/cache/cargo", CARGO_TARGET_DIR = "/cache/target" }
[[languages.verify]]
name = "fmt"
cmd  = "cargo fmt --all -- --check"
[[languages.verify]]
name = "build"
cmd  = "cargo build --locked"
[[languages.verify]]
name = "test"
cmd  = "cargo test --locked"
# opt-in coverage (instrumented recompile; reported, never gates):
# [[languages.verify]]
# name = "coverage"
# cmd  = "cargo llvm-cov --workspace --locked --summary-only"
# gate = false

[registry]
# The spawned program is `docker`; validate() requires it allowlisted (also defaults to the union of
# entry cmds, but state it explicitly as a tightening).
allowed_cmds = ["docker"]

[server]
addr = "127.0.0.1:8080"

# ── claude: the proven containerized agent (ADR-0013). Default + first to validate. ──
[[agents]]
id  = "claude"
cmd = "claude-agent-acp"
[agents.sandbox]
image   = "a2a-agent-reader:latest"
mount   = "/Users/wesleyjinks/code"            # == allowed_cwd_root (S2)
access  = "ro"
egress  = "locked"
network = "a2a-egress-internal"
proxy   = "http://a2a-egress-proxy:8888"
volumes = ["/Users/wesleyjinks/.config/a2a-creds/claude/.credentials.json:/root/.claude/.credentials.json"]

# ── codex: gpt-5.5 (auth + openai egress validated in-container). ──
[[agents]]
id  = "codex"
cmd = "codex-acp"
pre_authenticated = true
[agents.sandbox]
image   = "a2a-agent-reader:latest"
mount   = "/Users/wesleyjinks/code"
access  = "ro"
egress  = "locked"
network = "a2a-egress-internal"
proxy   = "http://a2a-egress-proxy:8888"
volumes = ["/Users/wesleyjinks/.config/a2a-creds/codex/auth.json:/root/.codex/auth.json"]

# ── kiro: Linux build baked into the image. VERIFIED: Linux auth is ~/.local/share/kiro-cli/data.sqlite3
#    (NOT ~/.aws); minted once via `kiro-cli login --use-device-flow` into the a2a-kiro-data volume. ──
[[agents]]
id   = "kiro"
cmd  = "kiro-cli"
args = ["acp"]
[agents.sandbox]
image   = "a2a-agent-reader:latest"
mount   = "/Users/wesleyjinks/code"
access  = "ro"
egress  = "locked"
network = "a2a-egress-internal"
proxy   = "http://a2a-egress-proxy:8888"
volumes = ["a2a-kiro-data:/root/.local/share"]

# ── impl: WRITE-capable containerized agent (kind="container_rw" PERMITS access="rw"). Under `implement`
#    it runs WARM (one container + one ACP session across the edit+fix turns, reaped at the end — ADR-0024);
#    under `serve`/`run-workflow` it's per-turn. The :rw mount is the per-request session cwd (a per-task
#    git clone) under allowed_cwd_root, canonicalized + is_under-gated.
#    DEFAULT IMPLEMENTOR = codex (gpt-5.5, effort=high). `sandbox_mode=danger-full-access` disables codex's
#    OWN bubblewrap sandbox (absent from the image) so it can edit the :rw clone — the Docker container IS
#    the sandbox. effort=high is now honored by the warm session (the ADR-0024 effective_config fold).
#    To use claude instead: cmd="claude-agent-acp", drop the codex args, and mount the claude creds.
[[agents]]
id     = "impl"
kind   = "container_rw"
cmd    = "codex-acp"
pre_authenticated = true
effort = "high"
args   = ["-c", "sandbox_mode=\"danger-full-access\"", "-c", "approval_policy=\"never\""]
[agents.sandbox]
image   = "a2a-toolchain:latest"               # B2b-2: toolchain so the agent (and verify) has cargo
mount   = "/Users/wesleyjinks/code"            # == allowed_cwd_root (S2); :rw target is the session cwd under it
access  = "rw"
egress  = "locked"
network = "a2a-egress-internal"
proxy   = "http://a2a-egress-proxy:8888"
volumes = ["/Users/wesleyjinks/.config/a2a-creds/codex/auth.json:/root/.codex/auth.json"]

# ── ollama: non-process api agent (kind="api"). Uncontainerized by design — no mount/proxy/creds.
#    NOT tool-free — it advertises a deterministic side-effect-free stub tool (no fs/shell).
#    Local => no remote egress (a cloud base_url would egress host-direct, bypassing the proxy). ──
[[agents]]
id          = "ollama"
kind        = "api"
base_url    = "http://localhost:11434/v1"
api_key_env = "OLLAMA_API_KEY"
model       = "qwen2.5-coder:7b"

# ── ollama-cloud: same api backend, ollama's hosted models. base_url is host-direct egress
#    (ollama.com), bypassing the container egress proxy — fine: this is the BRIDGE calling out
#    (non-process), not a contained agent. ──
[[agents]]
id          = "ollama-cloud"
kind        = "api"
base_url    = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"
model       = "qwen3-coder:480b"


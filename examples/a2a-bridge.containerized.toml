# kiro = :ro containerized reader behind the egress lock; claude+codex reviewers run HOST-SIDE with prism
# (codex hard read-only via sandbox_mode); impl = container_rw; + the non-process ollama.
# Run:  a2a-bridge serve --config examples/a2a-bridge.containerized.toml   (from the repo root)
# Prereqs (see docs/containerized-agents.md):
#   - docker compose -f deploy/containers/compose.egress.yaml up -d --build
#   - the reader image built (deploy/containers/reader.Containerfile) — for the kiro :ro reader
#   - per-agent creds: WRITABLE single-file copies in ~/.config/a2a-creds/{claude,codex}, and a
#     one-time `kiro-cli login --use-device-flow` into the `a2a-kiro-data` volume.
#
# MUST-FIX (dual-review): for the still-containerized agents (kiro :ro, impl :rw), allowed_cwd_root is
# OPT-IN and MUST equal the mount root, or they ship with NO cwd gate; identical-path mount makes the
# session/new cwd resolve inside the container. (claude+codex reviewers are host-side — not gated by this.)

default = "claude"

allowed_cwd_root = "/Users/wesleyjinks/code"

# B2b-3a: the review-the-diff run after `implement` commits + verifies. Two folded reviewers (codex+claude)
# review `git diff base..HEAD` in the clone (read-only nav tools) -> a synth emits VERDICT: APPROVE|REJECT,
# surfaced in the hand-off. ADVISORY (the operator accepts at merge). Absent -> skipped.
[review]
workflow = "implement-review"
# Two thorough reviewers navigating + reviewing a REAL diff routinely exceed the 300s default and trip a
# spurious timeout (looks like an agent failure but is just the bound). 1800s gives room (thorough does ~2×
# passes) while still capping a runaway review (bridge agents are full coding agents). Raise further for very
# large diffs.
timeout_secs = 1800
# Light-tier thresholds: diffs at or under BOTH limits use <workflow>-light (implement-review-light by
# convention) instead of the full two-reviewer workflow — faster and cheaper for small changes.
light_max_lines = 15
light_max_files = 2
# Thorough-tier trigger: a diff at or above EITHER limit (LLOC over code/infra files only — docs, tests,
# lockfiles, generated files, comments, blanks excluded) runs <workflow>-thorough (draft→refine ×2).
thorough_min_lines = 150
thorough_min_files = 6
# Default review depth when `--depth` is not given: auto | light | standard | thorough.
default_depth = "auto"

# B2b-3b: the review->tweak loop. After the first commit, the bridge runs verify+review each attempt; on a
# verify-FAIL or review-REJECT it re-prompts the `impl` agent (the `implement-fix` workflow) to fix on the
# SAME clone, then AMENDs the fix into the single commit. Bounded by max_attempts (commit turns: the initial
# commit + up to max_attempts-1 fix amends). Advisory -> the operator still accepts at merge. Absent -> 3.
[implement]
max_attempts = 3
fix_workflow = "implement-fix"

# B2b-2: the build+test verify run after `a2a-bridge implement` commits. Bridge-deterministic (the
# agent can't fake it), REPORTED not gating. Separate egress (registries only; NO creds) so creds and
# registry-egress never coexist. Coverage is opt-in (commented) — it can't reuse the warm non-instrumented
# cache. Default gates are fmt/clippy/build/test, all --locked against the :ro clone.
[verify]
image    = "a2a-toolchain:latest"
cache    = "a2a-verify-cache"                  # per-repo: the bridge appends a hash of the source path
egress   = "locked"
network  = "a2a-verify-egress"
proxy    = "http://a2a-verify-proxy:8888"
# NO_PROXY=localhost so `cargo test`'s local HTTP servers (wiremock etc.) aren't hijacked by the cargo-
# fetch proxy. Without it, any test that binds 127.0.0.1 spuriously fails verify (live-gate finding).
no_proxy = "localhost,127.0.0.1"
[[verify.commands]]
name = "fmt"
cmd  = "cargo fmt --all -- --check"
[[verify.commands]]
name = "clippy"
cmd  = "cargo clippy --all-targets --all-features --locked -- -D warnings"
[[verify.commands]]
name = "build"
cmd  = "cargo build --locked"
[[verify.commands]]
name = "test"
# A HERMETIC verify can't run this repo's SYSTEM-INTEGRATION tests — they need host capabilities the
# bare container lacks (dogfood finding). CI runs the full suite post-merge; the pre-merge verify covers
# fmt/clippy/build + the hermetic-safe tests:
#   --exclude bridge-container: its B2a tests spawn a real Docker daemon (no docker-in-docker here).
#   --skip process::tests::{terminate_reaps_child_no_zombie,term_ignoring_loop_forces_group_sigkill,drop_group_kills_descendants}:
#     the supervisor's zombie-reaping + process-group-SIGKILL/drop tests need host PID-1/signal semantics
#     and a host-visible process table (container PID namespace breaks the grandchild-visibility precondition).
cmd  = "cargo test --workspace --locked --exclude bridge-container -- --skip process::tests::terminate_reaps_child_no_zombie --skip process::tests::term_ignoring_loop_forces_group_sigkill --skip process::tests::drop_group_kills_descendants"
# opt-in coverage (instrumented recompile; reported, never gates):
# [[verify.commands]]
# name = "coverage"
# cmd  = "cargo llvm-cov --workspace --locked --summary-only"
# gate = false

[registry]
# docker: the container runtime for the impl/kiro/verify sandboxes.
# codex-acp + claude-agent-acp: host-side reviewer agents (codex/claude run without a sandbox block).
allowed_cmds = ["docker", "codex-acp", "claude-agent-acp"]

[server]
addr = "127.0.0.1:8080"

# ── claude: host-side reviewer with prism code-nav (no container sandbox; runs the host claude-agent-acp).
#    Moved from :ro container to host-side so it can use prism structural navigation for deeper reviews.
#    Read-only is PROMPT-CONTRACT only here (claude-agent-acp has no read-only flag) — softer than codex's
#    hard sandbox_mode=read-only below; acceptable for an advisory reviewer, but note the asymmetry. ──
[[agents]]
id  = "claude"
cmd = "claude-agent-acp"
model = "sonnet"   # reviewer pinned to Sonnet 4.6 (dogfood)
[[agents.mcp]]
name = "prism"
command = "/Users/wesleyjinks/code/slicing/target/release/prism-mcp"
args = ["--repo", "{cwd}", "--cache-dir", "/Users/wesleyjinks/.local/share/a2a/prism-cache-host"]
# lsp (L3): type-resolved semantic nav via rust-analyzer — the complement to prism's structural graph.
# --target-cache keys a per-repo CARGO_TARGET_DIR by origin → ~0.7s warm index across clones. See lsp-nav skill.
[[agents.mcp]]
name = "lsp"
command = "/Users/wesleyjinks/code/a2a-bridge/target/release/lsp-mcp"
args = ["--repo", "{cwd}", "--lang", "rust", "--target-cache", "/Users/wesleyjinks/.local/share/a2a/lsp-target-cache"]

# ── codex: host-side reviewer with prism code-nav (no container sandbox; runs host codex-acp in read-only
#    mode). sandbox_mode=read-only + approval_policy=never enforces hard read-only on the host-side agent. ──
[[agents]]
id  = "codex"
cmd = "codex-acp"
model = "gpt-5.5"   # reviewer pinned (dogfood)
args = ["-c", "sandbox_mode=\"read-only\"", "-c", "approval_policy=\"never\""]
[[agents.mcp]]
name = "prism"
command = "/Users/wesleyjinks/code/slicing/target/release/prism-mcp"
args = ["--repo", "{cwd}", "--cache-dir", "/Users/wesleyjinks/.local/share/a2a/prism-cache-host"]
# lsp (L3): type-resolved semantic nav via rust-analyzer — the complement to prism's structural graph.
# --target-cache keys a per-repo CARGO_TARGET_DIR by origin → ~0.7s warm index across clones. See lsp-nav skill.
[[agents.mcp]]
name = "lsp"
command = "/Users/wesleyjinks/code/a2a-bridge/target/release/lsp-mcp"
args = ["--repo", "{cwd}", "--lang", "rust", "--target-cache", "/Users/wesleyjinks/.local/share/a2a/lsp-target-cache"]

# ── kiro: Linux build baked into the image. VERIFIED: Linux auth is ~/.local/share/kiro-cli/data.sqlite3
#    (NOT ~/.aws); minted once via `kiro-cli login --use-device-flow` into the a2a-kiro-data volume. ──
[[agents]]
id   = "kiro"
cmd  = "kiro-cli"
args = ["acp"]
[agents.sandbox]
image   = "a2a-agent-reader:latest"
mount   = "/Users/wesleyjinks/code"
access  = "ro"
egress  = "locked"
network = "a2a-egress-internal"
proxy   = "http://a2a-egress-proxy:8888"
volumes = ["a2a-kiro-data:/root/.local/share"]

# ── impl: WRITE-capable containerized agent (kind="container_rw" PERMITS access="rw"). Under `implement`
#    it runs WARM (one container + one ACP session across the edit+fix turns, reaped at the end — ADR-0024);
#    under `serve`/`run-workflow` it's per-turn. The :rw mount is the per-request session cwd (a per-task
#    git clone) under allowed_cwd_root, canonicalized + is_under-gated.
#    DEFAULT IMPLEMENTOR = codex (gpt-5.5, effort=high). `sandbox_mode=danger-full-access` disables codex's
#    OWN bubblewrap sandbox (absent from the image) so it can edit the :rw clone — the Docker container IS
#    the sandbox. effort=high is now honored by the warm session (the ADR-0024 effective_config fold).
#    To use claude instead: cmd="claude-agent-acp", drop the codex args, and mount the claude creds.
[[agents]]
id     = "impl"
kind   = "container_rw"
cmd    = "codex-acp"
model  = "gpt-5.5"                             # explicit + validated (codex advertises it); was implicit-default
effort = "high"
args   = ["-c", "sandbox_mode=\"danger-full-access\"", "-c", "approval_policy=\"never\""]
[agents.sandbox]
image   = "a2a-toolchain:latest"               # B2b-2: toolchain so the agent (and verify) has cargo
mount   = "/Users/wesleyjinks/code"            # == allowed_cwd_root (S2); :rw target is the session cwd under it
access  = "rw"
egress  = "locked"
network = "a2a-egress-internal"
proxy   = "http://a2a-egress-proxy:8888"
volumes = ["/Users/wesleyjinks/.config/a2a-creds/codex/auth.json:/root/.codex/auth.json"]

# ── ollama: non-process api agent (kind="api"). Uncontainerized by design — no mount/proxy/creds.
#    NOT tool-free — it advertises a deterministic side-effect-free stub tool (no fs/shell).
#    Local => no remote egress (a cloud base_url would egress host-direct, bypassing the proxy). ──
[[agents]]
id          = "ollama"
kind        = "api"
base_url    = "http://localhost:11434/v1"
api_key_env = "OLLAMA_API_KEY"
model       = "qwen2.5-coder:7b"

# ── ollama-cloud: same api backend, ollama's hosted models. base_url is host-direct egress
#    (ollama.com), bypassing the container egress proxy — fine: this is the BRIDGE calling out
#    (non-process), not a contained agent. ──
[[agents]]
id          = "ollama-cloud"
kind        = "api"
base_url    = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"
model       = "qwen3-coder:480b"


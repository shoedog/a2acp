# Containerized :ro readers (claude + codex + kiro) behind the egress lock, + the non-process ollama.
# Run:  a2a-bridge serve --config examples/a2a-bridge.containerized.toml   (from the repo root)
# Prereqs (see docs/containerized-agents.md):
#   - docker compose -f deploy/containers/compose.egress.yaml up -d --build
#   - the reader image built (deploy/containers/reader.Containerfile)
#   - per-agent creds: WRITABLE single-file copies in ~/.config/a2a-creds/{claude,codex}, and a
#     one-time `kiro-cli login --use-device-flow` into the `a2a-kiro-data` volume.
#
# MUST-FIX (dual-review): allowed_cwd_root is OPT-IN and MUST equal the mount root, or readers ship
# with NO cwd gate. Identical-path :ro mount makes the session/new cwd resolve inside the container.

default = "claude"

allowed_cwd_root = "/Users/wesleyjinks/code"

[registry]
# The spawned program is `docker`; validate() requires it allowlisted (also defaults to the union of
# entry cmds, but state it explicitly as a tightening).
allowed_cmds = ["docker"]

[server]
addr = "127.0.0.1:8080"

# ── claude: the proven containerized agent (ADR-0013). Default + first to validate. ──
[[agents]]
id   = "claude"
cmd  = "docker"
args = [
  "run", "-i", "--rm",
  "--network", "a2a-egress-internal",
  "-e", "HTTPS_PROXY=http://a2a-egress-proxy:8888",
  "-e", "HTTP_PROXY=http://a2a-egress-proxy:8888",
  "-v", "/Users/wesleyjinks/code:/Users/wesleyjinks/code:ro",
  "-v", "/Users/wesleyjinks/.config/a2a-creds/claude/.credentials.json:/root/.claude/.credentials.json",
  "a2a-agent-reader:latest",
  "claude-agent-acp",
]

# ── codex: gpt-5.5 (auth + openai egress validated in-container). ──
[[agents]]
id   = "codex"
cmd  = "docker"
args = [
  "run", "-i", "--rm",
  "--network", "a2a-egress-internal",
  "-e", "HTTPS_PROXY=http://a2a-egress-proxy:8888",
  "-e", "HTTP_PROXY=http://a2a-egress-proxy:8888",
  "-v", "/Users/wesleyjinks/code:/Users/wesleyjinks/code:ro",
  "-v", "/Users/wesleyjinks/.config/a2a-creds/codex/auth.json:/root/.codex/auth.json",
  "a2a-agent-reader:latest",
  "codex-acp",
]

# ── kiro: Linux build baked into the image. VERIFIED: Linux auth is ~/.local/share/kiro-cli/data.sqlite3
#    (NOT ~/.aws); minted once via `kiro-cli login --use-device-flow` into the a2a-kiro-data volume. ──
[[agents]]
id   = "kiro"
cmd  = "docker"
args = [
  "run", "-i", "--rm",
  "--network", "a2a-egress-internal",
  "-e", "HTTPS_PROXY=http://a2a-egress-proxy:8888",
  "-e", "HTTP_PROXY=http://a2a-egress-proxy:8888",
  "-v", "/Users/wesleyjinks/code:/Users/wesleyjinks/code:ro",
  "-v", "a2a-kiro-data:/root/.local/share",
  "a2a-agent-reader:latest",
  "kiro-cli", "acp",
]

# ── ollama: non-process api agent (kind="api"). Uncontainerized by design — no mount/proxy/creds.
#    NOT tool-free — it advertises a deterministic side-effect-free stub tool (no fs/shell).
#    Local => no remote egress (a cloud base_url would egress host-direct, bypassing the proxy). ──
[[agents]]
id          = "ollama"
kind        = "api"
base_url    = "http://localhost:11434/v1"
api_key_env = "OLLAMA_API_KEY"
model       = "qwen2.5-coder:7b"

# ── ollama-cloud: same api backend, ollama's hosted models. base_url is host-direct egress
#    (ollama.com), bypassing the container egress proxy — fine: this is the BRIDGE calling out
#    (non-process), not a contained agent. ──
[[agents]]
id          = "ollama-cloud"
kind        = "api"
base_url    = "https://ollama.com/v1"
api_key_env = "OLLAMA_API_KEY"
model       = "qwen3-coder:480b"


# Codex (gpt-5.5, effort=xhigh) as the SPEC RE-REVIEWER for E3 (parallel batch dispatch). Read-only sandbox.
default = "codex"
[[agents]]
id = "codex"
cmd = "codex-acp"
model = "gpt-5.5"
effort = "xhigh"
args = ["-c", "sandbox_mode=\"read-only\"", "-c", "approval_policy=\"never\""]
[[workflows]]
id = "e3-spec-rereview"
[[workflows.nodes]]
id = "review"
agent = "codex"
prompt_file = "../prompts/e3-spec-rereview.md"
inputs = []
[server]
addr = "127.0.0.1:8146"

# Codex (gpt-5.5, effort=high) as the IMPLEMENTER for E6 (node retry).
# session-cwd = the repo, on feat/e6-node-retry; codex EDITS the tree, runs cargo, does NOT commit.
default = "codex"
[[agents]]
id = "codex"
cmd = "codex-acp"
model = "gpt-5.5"
effort = "high"
args = ["-c", "sandbox_mode=\"danger-full-access\"", "-c", "approval_policy=\"never\""]
[[workflows]]
id = "e6-impl"
[[workflows.nodes]]
id = "impl"
agent = "codex"
prompt_file = "../prompts/e6-impl.md"
inputs = []
[server]
addr = "127.0.0.1:8143"

# Codex (gpt-5.5, effort=xhigh) as the PLAN REVIEWER for E7 (typed task-spec). Read-only sandbox.
default = "codex"
[[agents]]
id = "codex"
cmd = "codex-acp"
model = "gpt-5.5"
effort = "xhigh"
args = ["-c", "sandbox_mode=\"read-only\"", "-c", "approval_policy=\"never\""]
[[workflows]]

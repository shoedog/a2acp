[package]
name = "bridge-acp"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
# `unstable_session_model` enables the SDK's `SetSessionModelRequest`/`ModelId`
# types + the `session/set_model` JsonRpcRequest impl, which the backend uses for
# best-effort model selection (Task 6). Those types do NOT exist without it.
agent-client-protocol = { workspace = true, features = ["unstable_session_model"] }
bridge-core = { path = "../bridge-core" }
thiserror.workspace = true
async-trait.workspace = true
tracing.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { workspace = true }
tokio-util = { workspace = true }
libc = { workspace = true }
futures.workspace = true

[dev-dependencies]
tokio = { workspace = true }
tokio-test = { workspace = true }

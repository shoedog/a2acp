# R3d0 characterization-required low-cost Claude host profile. It grants no execution authority.
default = "claude-haiku-host"

[[agents]]
id = "claude-haiku-host"
cmd = "claude-agent-acp"
model = "haiku"
effort = "low"

[registry]
allowed_cmds = ["claude-agent-acp"]

[server]
addr = "127.0.0.1:8080"
